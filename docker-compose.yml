services:
  bff:
    depends_on:
      database_mongo:
        condition: service_started
      cache_redis:
        condition: service_started
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: domestic_bff
    networks:
      - domestic_network
    environment:
      - NODE_ENV=development
      - MONGO_URI=mongodb://database_mongo:27017/backend_database_mongo
      - CACHE_REDIS_HOST=cache_redis
      - API_BASE_URL=http://host.docker.internal:3000
      - KEYCLOAK_BASE_URL=http://keycloak:8080
    env_file:
      - .env
    ports:
      - '${PORT}:${PORT}'
    volumes:
      - ./src:/app/src
      - ./dist:/app/dist
      - ./logs:/app/logs
    stdin_open: true
    tty: true
    deploy:
      resources:
        limits:
          memory: 512m

  ### MONGODB
  database_mongo:
    image: mongo:7
    container_name: domestic_database_mongo
    networks:
      - domestic_network
    restart: always
    ports:
      - '${DATABASE_MONGO_PORT}:27017'
    volumes:
      - database_mongo_data:/data/db
      - database_mongo_config:/data/configdb
    deploy:
      resources:
        limits:
          memory: 512m

  ### REDIS (cache + Pub/Sub)
  cache_redis:
    image: redis:7
    container_name: domestic_cache_redis
    networks:
      - domestic_network
    restart: always
    ports:
      - '${CACHE_REDIS_PORT}:6379'
    volumes:
      - cache_redis_data:/data
    deploy:
      resources:
        limits:
          memory: 64m

  ### KEYCLOAK
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: domestic_keycloak
    networks:
      - domestic_network
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://database_keycloak:5432/keycloak
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER:-keycloak}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}
      KC_HOSTNAME_STRICT: false
      KC_HOSTNAME_STRICT_HTTPS: false
      KC_HTTP_ENABLED: true
      JAVA_OPTS_APPEND: "-Xms128m -Xmx512m"
    ports:
      - '${KEYCLOAK_PORT}:8080'
    depends_on:
      database_keycloak:
        condition: service_healthy
    command: ['start-dev', '--import-realm']
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./keycloak-config/domestic-backend-realm.json:/opt/keycloak/data/import/domestic-backend-realm.json
    deploy:
      resources:
        limits:
          memory: 600m

  database_keycloak:
    image: postgres:18
    container_name: domestic_database_keycloak
    networks:
      - domestic_network
    environment:
      POSTGRES_USER: ${KEYCLOAK_DB_USER:-keycloak}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}
      POSTGRES_DB: keycloak
    volumes:
      - database_keycloak_data:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${KEYCLOAK_DB_USER:-keycloak} -d keycloak']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256m

  ### SONARQUBE (opcional)
  sonarqube:
    image: sonarqube:community
    container_name: domestic_sonarqube
    networks:
      - domestic_network
    depends_on:
      - sonar-db
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    ports:
      - '9001:9000'
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_temp:/opt/sonarqube/temp
    deploy:
      resources:
        limits:
          memory: 512m

  sonar-db:
    image: postgres:13
    container_name: domestic_database_sonarqube
    networks:
      - domestic_network
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonar
    volumes:
      - sonar_database:/var/lib/postgresql
      - sonar_database_postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 256m

volumes:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  sonarqube_temp:
  sonar_database:
  sonar_database_postgres_data:
  database_mongo_data:
  database_mongo_config:
  cache_redis_data:
  keycloak_data:
  database_keycloak_data:

networks:
  domestic_network:
    name: domestic_network
    driver: bridge
