name: Build and Push Docker Image

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase repository name
        run: echo "REPO_LC=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.REPO_LC }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          no-cache: true
          cache-to: type=registry,ref=ghcr.io/${{ env.REPO_LC }}:buildcache,mode=max

      - name: Update Kubernetes deployment
        if: github.ref == 'refs/heads/main'
        run: |
          git clone https://github.com/Andersonfrfilho/domestic-kubernets.git /tmp/domestic-kubernets
          cd /tmp/domestic-kubernets

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "GitHub Actions"

          BUILD_TIMESTAMP=$(date -u +'%Y-%m-%dT%H:%M:%SZ')

          sed -i "s/build.timestamp:.*/build.timestamp: \"$BUILD_TIMESTAMP\"/" bff/bff.deployment.yaml
          sed -i "s/build.commit:.*/build.commit: \"${{ github.sha }}\"/" bff/bff.deployment.yaml

          git add bff/bff.deployment.yaml

          if git diff --cached --exit-code > /dev/null; then
            echo "No changes to commit"
          else
            git commit -m "chore: update bff image to ${{ github.sha }}"
            git push https://x-access-token:${{ secrets.KUBERNETS_PAT }}@github.com/Andersonfrfilho/domestic-kubernets.git
          fi
